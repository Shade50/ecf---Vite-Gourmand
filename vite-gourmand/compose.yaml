services:
###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.4
    container_name: vite_gourmand_mysql
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: vite_gourmand
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: app
      MYSQL_PASSWORD: app

    ports:
      - "127.0.0.1:3307:3306"

    volumes:
      - database:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -proot --silent"
        ]
      timeout: 5s
      retries: 10
      start_period: 30s
###< doctrine/doctrine-bundle ###

  mongodb:
    image: mongodb/mongodb-community-server:7.0-ubi9-slim
    container_name: vite_gourmand_mongodb
    restart: unless-stopped

    ports:
      - "127.0.0.1:27017:27017"

    volumes:
      - mongodb:/data/db

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile

    container_name: vite_gourmand_nginx
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: vite_gourmand_php
    restart: unless-stopped
    working_dir: /var/www/app

    environment:
      DATABASE_URL: "mysql://app:app@database:3306/vite_gourmand?serverVersion=8.4.0&charset=utf8mb4"
      APP_MONGODB_URL: "mongodb://mongodb:27017"
      APP_MONGODB_DB: "vite_gourmand_stats"

    depends_on:
      database:
        condition: service_healthy
      mongodb:
        condition: service_started

volumes:
###> doctrine/doctrine-bundle ###
  database:
###< doctrine/doctrine-bundle ###
  mongodb: